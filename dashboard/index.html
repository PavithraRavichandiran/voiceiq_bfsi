<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceIQ-BFSI — Latency Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e2330;
      padding-bottom: 1rem;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    header span { font-size: 0.85rem; color: #64748b; }

    #status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      margin-left: auto;
    }

    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    #dot.live { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #161b27;
      border: 1px solid #1e2330;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .card .big {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .card .sub {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.3rem;
    }

    .target-ok   { color: #22c55e; }
    .target-warn { color: #f59e0b; }
    .target-bad  { color: #ef4444; }

    .chart-wrap {
      background: #161b27;
      border: 1px solid #1e2330;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .chart-wrap h2 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #cbd5e1;
    }

    canvas { width: 100% !important; }

    .try-panel {
      background: #161b27;
      border: 1px solid #1e2330;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .try-panel h2 { font-size: 0.9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 1rem; }

    textarea {
      width: 100%;
      height: 90px;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 0.75rem;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: 2px solid #3b82f6; border-color: transparent; }

    button {
      margin-top: 0.75rem;
      padding: 0.55rem 1.4rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover    { background: #2563eb; }
    button:disabled { background: #374151; cursor: not-allowed; }

    #result {
      margin-top: 1rem;
      background: #0f1117;
      border: 1px solid #1e2330;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.78rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      white-space: pre-wrap;
      color: #86efac;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>VoiceIQ-BFSI</h1>
  <span>Real-time pipeline latency</span>
  <div id="status">
    <div id="dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<!-- KPI cards -->
<div class="grid">
  <div class="card">
    <h3>P90 End-to-End</h3>
    <div class="big" id="kpi-total">—</div>
    <div class="sub">Target &lt; 900ms</div>
  </div>
  <div class="card">
    <h3>P90 STT Correction</h3>
    <div class="big" id="kpi-correction">—</div>
    <div class="sub">Target &lt; 200ms</div>
  </div>
  <div class="card">
    <h3>P90 Entity Extraction</h3>
    <div class="big" id="kpi-extraction">—</div>
    <div class="sub">Target &lt; 350ms</div>
  </div>
  <div class="card">
    <h3>Requests measured</h3>
    <div class="big" id="kpi-count">0</div>
    <div class="sub">since server start</div>
  </div>
</div>

<!-- Bar chart -->
<div class="chart-wrap">
  <h2>P50 / P90 / P99 Latency per Pipeline Stage (ms)</h2>
  <canvas id="latencyChart" height="90"></canvas>
</div>

<!-- Live try panel -->
<div class="try-panel">
  <h2>Try it live</h2>
  <div style="display:flex; gap:0.6rem; align-items:flex-start;">
    <textarea id="transcript" placeholder="Paste a Hinglish transcript — or click the mic and speak…
e.g. main teen lakh ka personal lon lena chahta hoon barah mahne ke liye" style="flex:1"></textarea>
    <button id="micBtn" onclick="toggleMic()" title="Speak in Hinglish" style="width:44px;height:44px;padding:0;font-size:1.2rem;margin-top:0;flex-shrink:0;">🎙️</button>
  </div>
  <div id="mic-status" style="font-size:0.75rem;color:#64748b;margin-top:0.4rem;min-height:1rem;"></div>
  <button id="runBtn" onclick="runExtraction()">Extract entities</button>
  <pre id="result"></pre>
  <div id="tts-wrap" style="display:none; margin-top:1rem;">
    <div style="font-size:0.75rem; color:#64748b; margin-bottom:0.4rem;">Voice response</div>
    <audio id="tts-player" controls style="width:100%; height:36px;"></audio>
  </div>
</div>

<script>
  const STAGES = ['correction_ms', 'extraction_ms', 'total_ms'];
  const LABELS = ['STT Correction', 'Entity Extraction', 'End-to-End'];
  const TARGETS = { total_ms: 900, correction_ms: 200, extraction_ms: 350 };

  const chart = new Chart(document.getElementById('latencyChart'), {
    type: 'bar',
    data: {
      labels: LABELS,
      datasets: [
        { label: 'P50', data: [0, 0, 0], backgroundColor: '#3b82f6' },
        { label: 'P90', data: [0, 0, 0], backgroundColor: '#8b5cf6' },
        { label: 'P99', data: [0, 0, 0], backgroundColor: '#ec4899' },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8' } } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e2330' } },
        y: {
          ticks: { color: '#94a3b8', callback: v => v + 'ms' },
          grid:  { color: '#1e2330' },
          title: { display: true, text: 'Latency (ms)', color: '#64748b' },
        },
      },
    },
  });

  function colorClass(ms, stage) {
    if (!TARGETS[stage]) return '';
    if (ms <= TARGETS[stage] * 0.8)  return 'target-ok';
    if (ms <= TARGETS[stage])        return 'target-warn';
    return 'target-bad';
  }

  function updateKPIs(stats) {
    const map = {
      'kpi-total':      ['total_ms',      900],
      'kpi-correction': ['correction_ms', 200],
      'kpi-extraction': ['extraction_ms', 350],
    };
    for (const [id, [stage]] of Object.entries(map)) {
      const el = document.getElementById(id);
      const p90 = stats[stage]?.p90 ?? null;
      if (p90 === null) { el.textContent = '—'; continue; }
      el.textContent = p90 + 'ms';
      el.className = 'big ' + colorClass(p90, stage);
    }
    const count = stats['total_ms']?.count ?? 0;
    document.getElementById('kpi-count').textContent = count;
  }

  function updateChart(stats) {
    chart.data.datasets[0].data = STAGES.map(s => stats[s]?.p50 ?? 0);
    chart.data.datasets[1].data = STAGES.map(s => stats[s]?.p90 ?? 0);
    chart.data.datasets[2].data = STAGES.map(s => stats[s]?.p99 ?? 0);
    chart.update('none');
  }

  function connectSSE() {
    const es = new EventSource('/api/stats');

    es.onopen = () => {
      document.getElementById('dot').classList.add('live');
      document.getElementById('status-text').textContent = 'live';
    };

    es.onmessage = (e) => {
      const stats = JSON.parse(e.data);
      if (!stats) return;
      updateKPIs(stats);
      updateChart(stats);
    };

    es.onerror = () => {
      document.getElementById('dot').classList.remove('live');
      document.getElementById('status-text').textContent = 'reconnecting…';
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  async function runExtraction() {
    const transcript = document.getElementById('transcript').value.trim();
    if (!transcript) return;

    const btn    = document.getElementById('runBtn');
    const result = document.getElementById('result');

    btn.disabled    = true;
    btn.textContent = 'Extracting…';
    result.style.display = 'none';

    try {
      const res  = await fetch('/api/extract', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ transcript }),
      });
      const data = await res.json();
      result.textContent    = JSON.stringify(data, null, 2);
      result.style.display  = 'block';
      await generateTTSResponse(data.entities);
    } catch (err) {
      result.textContent   = 'Error: ' + err.message;
      result.style.display = 'block';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Extract entities';
    }
  }

  connectSSE();

  // ── Voice input via Deepgram Nova-2 (raw PCM WebSocket streaming) ────────
  let audioCtx    = null;
  let scriptProc  = null;
  let micStream   = null;
  let dgSocket    = null;
  let isListening = false;

  function toggleMic() {
    isListening ? stopMic() : startMic();
  }

  async function startMic() {
    const statusEl = document.getElementById('mic-status');
    const taEl     = document.getElementById('transcript');

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      statusEl.textContent = `Mic access denied: ${err.message}`;
      return;
    }

    // Set up audio pipeline immediately so the first chunk is ready by the time
    // the WebSocket handshake completes — avoids losing the first 1-2 words.
    audioCtx   = new AudioContext({ sampleRate: 16000 });
    const src  = audioCtx.createMediaStreamSource(micStream);
    scriptProc = audioCtx.createScriptProcessor(2048, 1, 1);  // 128ms chunks

    dgSocket = new WebSocket(`ws://${location.host}/ws/stt`);

    scriptProc.onaudioprocess = (ev) => {
      if (!isListening || !dgSocket || dgSocket.readyState !== WebSocket.OPEN) return;
      const f32 = ev.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++)
        i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
      dgSocket.send(i16.buffer);
    };

    src.connect(scriptProc);
    scriptProc.connect(audioCtx.destination);

    dgSocket.onopen = () => {
      isListening = true;
      document.getElementById('micBtn').style.background = '#ef4444';
      statusEl.textContent = 'Listening via Deepgram Nova-2… speak in Hinglish';
      taEl.value = '';
    };

    dgSocket.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'error') {
        statusEl.textContent = `Error: ${msg.message}`;
        stopMic();
        return;
      }
      if (msg.type === 'transcript' && msg.text) {
        taEl.value = msg.text;
        if (msg.isFinal || msg.speech) {
          statusEl.textContent = 'Got it — click Extract entities';
        }
      }
    };

    dgSocket.onerror = () => {
      statusEl.textContent = 'WebSocket error — is the server running?';
      stopMic();
    };

    dgSocket.onclose = () => { if (isListening) stopMic(); };
  }

  function stopMic() {
    isListening = false;
    document.getElementById('micBtn').style.background = '#3b82f6';
    document.getElementById('mic-status').textContent  = '';
    if (scriptProc) { scriptProc.disconnect(); scriptProc = null; }
    if (audioCtx)   { audioCtx.close();        audioCtx   = null; }
    if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (dgSocket && dgSocket.readyState === WebSocket.OPEN) {
      dgSocket.close();
      dgSocket = null;
    }
  }

  // ── TTS — natural Hinglish confirmation ─────────────────────────────────
  function formatAmount(val) {
    if (!val) return null;
    const v = val.value;
    if (v >= 10000000) return `${(v / 10000000).toFixed(1).replace('.0', '')} करोड़`;
    if (v >= 100000)   return `${(v / 100000).toFixed(1).replace('.0', '')} लाख`;
    if (v >= 1000)     return `${(v / 1000).toFixed(1).replace('.0', '')} हज़ार`;
    return `${v}`;
  }

  function formatTenure(t) {
    if (!t) return null;
    return `${t.value} ${t.unit === 'years' ? 'साल' : 'महीने'}`;
  }

  const PRODUCT_HI = {
    personal_loan: 'personal loan',  home_loan: 'home loan',
    car_loan:      'car loan',        credit_card: 'credit card',
    insurance:     'insurance',       fd: 'FD',
    rd:            'RD',              mutual_fund: 'mutual fund',
  };

  function buildConfirmation(entities) {
    if (!entities) return 'Kuch samajh nahi aaya, please dobara boliye.';

    const e       = entities;
    const intent  = e.call_intent?.value;
    const product = e.product_type?.value;
    const amount  = formatAmount(e.loan_amount);
    const tenure  = formatTenure(e.loan_tenure);
    const emi     = formatAmount(e.emi_amount);
    const income  = formatAmount(e.monthly_income);
    const rate    = e.interest_rate ? `${e.interest_rate.value} percent` : null;
    const pan     = e.pan_number?.value;
    const prod    = product ? PRODUCT_HI[product] : null;

    // ── Collections ──
    if (intent === 'collections') {
      const due = amount ? `${amount} रुपये` : 'kuch amount';
      return `Aapka ${prod || 'loan'} ka ${due} payment abhi bhi pending hai. Kya aap aaj payment kar sakte hain?`;
    }

    // ── Complaint ──
    if (intent === 'complaint') {
      return `Samajh gaya, aapko ${prod || 'aapki service'} mein ek problem aa rahi hai. Hum abhi investigate karte hain — kya aap thoda aur detail de sakte hain?`;
    }

    // ── Data validation / KYC ──
    if (intent === 'data_validation') {
      return pan
        ? `Aapka PAN number ${pan.split('').join(' ')} hai — kya yeh sahi hai?`
        : 'Aapka KYC verification karna hai — kya aap apna PAN number bata sakte hain?';
    }

    // ── EMI payment / rescheduling ──
    if (intent === 'emi_payment') {
      return emi
        ? `Aapki EMI ${emi} रुपये hai aur aap ise reschedule karna chahte hain — kya yeh sahi hai?`
        : 'Aap apni EMI ke baare mein baat karna chahte hain — please details batayein.';
    }

    // ── Loan / product enquiry ──
    if (amount && prod && tenure) {
      let msg = `Aapko ${amount} रुपये ka ${prod} chahiye, ${tenure} ke liye`;
      if (emi)    msg += `, aur EMI ${emi} रुपये se zyada nahi chahiye`;
      if (income) msg += `. Aapki monthly salary ${income} रुपये hai`;
      if (rate)   msg += `, aur aap chahte hain ki interest rate ${rate} se kam ho`;
      return msg + ' — kya yeh sahi hai?';
    }

    if (amount && prod) {
      let msg = `Aapko ${amount} रुपये ka ${prod} chahiye`;
      if (income) msg += `. Aapki salary ${income} रुपये hai`;
      return msg + ' — kya yeh sahi hai?';
    }

    if (amount && tenure) {
      return `Aapko ${amount} रुपये ka loan chahiye, ${tenure} ke liye — kya yeh sahi hai?`;
    }

    if (prod && tenure) {
      return `Aapko ${prod} chahiye, ${tenure} ke liye — kya yeh sahi hai?`;
    }

    if (amount) {
      return `Aapko ${amount} रुपये ka loan chahiye — kya yeh sahi hai?`;
    }

    return 'Theek hai, main aapki request process kar raha hoon. Ek second please.';
  }

  async function generateTTSResponse(entities) {
    const text = buildConfirmation(entities);
    const wrap = document.getElementById('tts-wrap');
    const player = document.getElementById('tts-player');

    try {
      const res = await fetch('/api/tts', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error(await res.text());

      const blob = await res.blob();
      player.src = URL.createObjectURL(blob);
      wrap.style.display = 'block';
      player.play();
    } catch (err) {
      wrap.style.display = 'none';
    }
  }
</script>
</body>
</html>
